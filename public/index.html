<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clippy</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0d0f'/%3E%3Cpolygon points='16,4 28,12 16,20 4,12' fill='%23e8a84c'/%3E%3Cpolygon points='16,20 22,24 16,28 10,24' fill='%23c47a20'/%3E%3C/svg%3E">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" rel="stylesheet">

  <style>
    :root {
      --bg:             #0c0c0f;
      --surface:        #141419;
      --panel:          #17171e;
      --panel-solid:    #17171e;
      --border:         rgba(255,255,255,0.08);
      --border-hover:   rgba(255,255,255,0.16);

      --text-primary:   #eeeaf3;
      --text-secondary: #b0aab8;
      --text-label:     #8a8496;
      --text-muted:     #5a5466;

      --accent:         #e8a84c;
      --accent-dim:     rgba(232,168,76,0.13);
      --accent-glow:    rgba(232,168,76,0.28);
      --blue:           #6b9eff;
      --blue-dim:       rgba(107,158,255,0.13);
      --red:            #f06b6b;
      --red-dim:        rgba(240,107,107,0.13);
      --green:          #5dd68c;
      --green-dim:      rgba(93,214,140,0.13);
      --purple:         #b48bff;
      --purple-dim:     rgba(180,139,255,0.13);

      --radius-xs:  4px;
      --radius-sm:  7px;
      --radius-md:  11px;
      --radius-lg:  16px;
      --radius-xl:  22px;

      --shadow-panel: 0 0 0 1px var(--border),
                      0 8px 32px rgba(0,0,0,0.5),
                      0 32px 80px rgba(0,0,0,0.4);

      --transition: 0.16s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      overflow: hidden;
      width: 100vw; height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #canvas-container {
      position: fixed; inset: 0;
      z-index: 1;
    }

    .sidebar {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 268px;
      max-height: 95vh;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 100;

      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-panel);

      animation: sidebarIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes sidebarIn {
      from { opacity: 0; transform: translateY(-50%) translateX(24px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 99px; }

    .sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: #0c0c0f;
      border: 1px solid rgba(232,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .logo-mark svg {
      width: 75px; height: 75px;
      display: block;
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-label);
      margin-top: 1px;
    }

    .logo-badge {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(232,168,76,0.22);
      padding: 3px 7px;
      border-radius: 99px;
    }

    .sidebar-body { padding: 14px 15px 18px; }

    .section { margin-bottom: 17px; }
    .section:last-child { margin-bottom: 0; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-label);
      margin-bottom: 8px;
      user-select: none;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .color-row { display: flex; align-items: center; gap: 10px; }

    .color-swatch-wrap {
      position: relative;
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .color-swatch-wrap input[type="color"] {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
      border: none; padding: 0;
    }

    .color-swatch {
      width: 100%; height: 100%;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-hover);
      pointer-events: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .color-swatch-wrap:hover .color-swatch {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .color-meta { display: flex; flex-direction: column; gap: 2px; }

    .color-hex {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    .color-hint {
      font-size: 10px;
      color: var(--text-muted);
    }

    .slider-row { display: flex; align-items: center; gap: 10px; }

    input[type="range"] {
      flex: 1; height: 4px;
      border-radius: 99px;
      background: rgba(255,255,255,0.1);
      outline: none;
      appearance: none; -webkit-appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--accent-dim), 0 2px 6px rgba(0,0,0,0.5);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 0 5px var(--accent-dim), 0 2px 6px rgba(0,0,0,0.5);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
    }

    .val-badge {
      min-width: 34px; text-align: center;
      font-size: 11px; font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(232,168,76,0.18);
      border-radius: var(--radius-xs);
      padding: 3px 5px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }

    .custom-select { position: relative; }
    .custom-select::after {
      content: '▾';
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: var(--text-label);
      pointer-events: none;
    }

    select {
      width: 100%;
      padding: 9px 28px 9px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      appearance: none; -webkit-appearance: none;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    select:focus, select:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    select option { background: #1e1e28; color: var(--text-primary); }

    input[type="text"] {
      width: 100%;
      padding: 9px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      width: 100%;
      padding: 9px 13px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.1px;
      white-space: nowrap;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; transform: none !important; }

    .btn-ghost {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: rgba(255,255,255,0.05);
    }

    .btn-blue {
      background: var(--blue-dim);
      border-color: rgba(107,158,255,0.22);
      color: var(--blue);
    }
    .btn-blue:hover:not(:disabled) { background: rgba(107,158,255,0.2); }

    .btn-red {
      background: var(--red-dim);
      border-color: rgba(240,107,107,0.22);
      color: var(--red);
    }
    .btn-red:hover:not(:disabled) { background: rgba(240,107,107,0.2); }

    .btn-green {
      background: var(--green-dim);
      border-color: rgba(93,214,140,0.22);
      color: var(--green);
    }
    .btn-green:hover:not(:disabled) { background: rgba(93,214,140,0.2); }

    .btn-purple {
      background: var(--purple-dim);
      border-color: rgba(180,139,255,0.22);
      color: var(--purple);
    }
    .btn-purple:hover:not(:disabled) { background: rgba(180,139,255,0.2); }

    .btn-icon {
      width: 34px; height: 34px;
      padding: 0; flex-shrink: 0;
      font-size: 17px; font-weight: 400;
    }

    .row-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .row-3   { display: grid; grid-template-columns: 34px 1fr 34px; gap: 6px; align-items: center; }
    .row-flex { display: flex; gap: 6px; align-items: center; }

    .zoom-display {
      text-align: center;
      font-size: 11px; font-weight: 700;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    .game-prompt {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      min-height: 38px;
      word-break: break-word;
      line-height: 1.5;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }
    .game-prompt.has-prompt {
      color: var(--accent);
      border-color: rgba(232,168,76,0.25);
      background: var(--accent-dim);
    }

    .sep { height: 1px; background: var(--border); margin: 12px 0; }

    .pan-hint {
      position: fixed;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      background: rgba(12,12,15,0.85);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.2px;
      padding: 7px 18px;
      border-radius: 99px;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      animation: hintUp 0.5s 1s cubic-bezier(0.22,1,0.36,1) both;
    }
    .pan-hint kbd {
      color: var(--text-secondary);
      font-family: inherit;
    }

    @keyframes hintUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .section { animation: sectionIn 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    .section:nth-child(1)  { animation-delay: 0.10s; }
    .section:nth-child(2)  { animation-delay: 0.14s; }
    .section:nth-child(3)  { animation-delay: 0.18s; }
    .section:nth-child(4)  { animation-delay: 0.22s; }
    .section:nth-child(5)  { animation-delay: 0.26s; }
    .section:nth-child(6)  { animation-delay: 0.30s; }
    .section:nth-child(7)  { animation-delay: 0.34s; }
    .section:nth-child(8)  { animation-delay: 0.38s; }
    .section:nth-child(9)  { animation-delay: 0.42s; }
    .section:nth-child(10) { animation-delay: 0.46s; }
    .section:nth-child(11) { animation-delay: 0.50s; }

    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    canvas { display: block; }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div class="pan-hint">
    <kbd>Scroll</kbd> to zoom &nbsp;·&nbsp; <kbd>Space + drag</kbd> or <kbd>middle-click</kbd> to pan
  </div>

  <div class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="10,2 18,7 10,12 2,7" fill="#e8a84c"/>
          <polygon points="10,12 14,15 10,19 6,15" fill="#c47a20"/>
          <!-- Inner highlight -->
          <polygon points="10,5 15,8 10,11 5,8" fill="rgba(255,220,140,0.25)"/>
        </svg>
      </div>

      <div class="logo-wordmark">
        <span class="logo-name">Clippy</span>
      </div>
    </div>

    <div class="sidebar-body">

      <div class="section">
        <div class="section-label">Brush Color</div>
        <div class="color-row">
          <div class="color-swatch-wrap">
            <div class="color-swatch" id="colorSwatch" style="background:#000000"></div>
            <input type="color" id="colorPicker" value="#000000">
          </div>
          <div class="color-meta">
            <span class="color-hex" id="colorHex">#000000</span>
            <span class="color-hint">Click to change</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Brush Size</div>
        <div class="slider-row">
          <input type="range" id="brushSize" min="1" max="50" value="10">
          <span class="val-badge" id="brushSizeValue">10</span>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Tool</div>
        <div class="custom-select">
          <select id="toolSelect">
            <option value="brush">✦  Brush</option>
            <option value="eraser">◈  Eraser</option>
            <option value="spray">❋  Spray</option>
            <option value="line">╱  Line</option>
            <option value="rectangle">▭  Rectangle</option>
            <option value="circle">◯  Circle</option>
            <option value="text">T   Text</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Text Content</div>
        <input id="textInput" type="text" placeholder="Type something…" style="margin-bottom:7px">
        <div class="section-label" style="margin-top:4px">Text Size</div>
        <div class="slider-row">
          <input type="range" id="textSize" min="8" max="96" value="24">
          <span class="val-badge" id="textSizeValue">24</span>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Background</div>
        <div class="color-row">
          <div class="color-swatch-wrap">
            <div class="color-swatch" id="bgSwatch" style="background:#ffffff"></div>
            <input type="color" id="bgColorPicker" value="#ffffff">
          </div>
          <div class="color-meta">
            <span class="color-hex" id="bgColorHex">#ffffff</span>
            <span class="color-hint">Canvas fill</span>
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <div class="section">
        <div class="section-label">Layer</div>
        <div class="row-flex">
          <div class="custom-select" style="flex:1">
            <select id="layerSelect"></select>
          </div>
          <button class="btn btn-ghost btn-icon" id="newLayerBtn" title="New layer">+</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Zoom</div>
        <div class="row-3" style="margin-bottom:6px">
          <button class="btn btn-ghost btn-icon" id="zoomOutBtn" title="Zoom out">−</button>
          <div class="zoom-display" id="zoomDisplay">100%</div>
          <button class="btn btn-ghost btn-icon" id="zoomInBtn"  title="Zoom in">+</button>
        </div>
        <button class="btn btn-ghost" id="zoomResetBtn" style="font-size:11px;padding:7px">↺ Reset to 100%</button>
      </div>

      <div class="section">
        <div class="section-label">History</div>
        <div class="row-2">
          <button class="btn btn-blue" id="undoBtn" title="Undo (Ctrl+Z)">↩ Undo</button>
          <button class="btn btn-blue" id="redoBtn" title="Redo (Ctrl+Y)">↪ Redo</button>
        </div>
      </div>

      <div class="sep"></div>

      <div class="section">
        <div class="section-label">Game Mode</div>
        <button class="btn btn-purple" id="startGameBtn" style="margin-bottom:6px">⚡ Start Game</button>
        <button class="btn btn-red"    id="stopGameBtn"  style="margin-bottom:0">✕ Stop Game</button>
        <div id="gamePrompt" class="game-prompt" aria-live="polite"></div>
      </div>

      <div class="sep"></div>

      <div class="section">
        <div class="row-2">
          <button class="btn btn-red"   id="clearBtn">⌫ Clear</button>
          <button class="btn btn-green" id="saveBtn">↓ Save</button>
        </div>
      </div>

    </div>
  </div>

  <script src="sketch.js"></script>

  <script>
    document.getElementById('colorPicker').addEventListener('input', e => {
      document.getElementById('colorSwatch').style.background = e.target.value;
      document.getElementById('colorHex').textContent = e.target.value;
    });
    document.getElementById('bgColorPicker').addEventListener('input', e => {
      document.getElementById('bgSwatch').style.background = e.target.value;
      document.getElementById('bgColorHex').textContent = e.target.value;
    });

    const promptEl = document.getElementById('gamePrompt');
    const promptObserver = new MutationObserver(() => {
      promptEl.classList.toggle('has-prompt', promptEl.textContent.trim().length > 0);
    });
    promptObserver.observe(promptEl, { childList: true, characterData: true, subtree: true });
  </script>
</body>
</html>
